<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini AI - Namuun</title>
<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  height: 100vh;
  margin: 0;
}
h1 {
  margin-top: 20px;
}
#chat {
  width: 90%;
  max-width: 500px;
  flex: 1;
  overflow-y: auto;
  margin: 10px;
  padding: 10px;
  background: #1e293b;
  border-radius: 10px;
}
input {
  width: 70%;
  padding: 10px;
}
button {
  padding: 10px;
}
.msg {
  margin: 5px 0;
}
.user { color: #38bdf8; }
.ai { color: #34d399; }
</style>
</head>

<body>

<h1>🤖 Намуун AI</h1>

<div id="chat"></div>

<input id="input" placeholder="Юу асуух вэ?" />
<button onclick="send()">Илгээх</button>

<script>
const chat = document.getElementById("chat");

function addMsg(text, cls){
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function send(){
  const input = document.getElementById("input");
  const text = input.value;
  if(!text) return;

  addMsg("Чи: " + text, "user");

  let reply = "Би ойлголоо. (дараагийн алхамд AI холбох болно)";

  if(text.includes("сайн уу")){
    reply = "Сайн байна уу Ананд 😊 Би Намуун байна.";
  }
  if(text.includes("хэн бэ")){
    reply = "Би чиний хувийн туслах Намуун.";
  }

  setTimeout(() => {
    addMsg("Намуун: " + reply, "ai");
  }, 500);

  input.value = "";
}
</script>

</body>
</html>

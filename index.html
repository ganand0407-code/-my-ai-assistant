<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <title>Намуун AI</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: auto;
      padding: 20px;
      background: #111;
      color: white;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 8px;
      border: none;
    }
    input {
      background: #222;
      color: white;
    }
    button {
      background: #4f46e5;
      color: white;
      cursor: pointer;
    }
    #chatBox {
      margin-top: 20px;
      padding: 10px;
      background: #1a1a1a;
      border-radius: 10px;
      min-height: 200px;
    }
    .msg {
      margin: 8px 0;
    }
  </style>
</head>

<body>

  <h2>🤖 Намуун AI</h2>

  <input id="apiKey" placeholder="OpenAI API Key энд оруул">
  <input id="userInput" placeholder="Юу асуух вэ?">
  <button onclick="sendMessage()">Илгээх</button>

  <div id="chatBox"></div>

  <script>
    async function sendMessage() {
      const message = document.getElementById("userInput").value;
      const apiKey = document.getElementById("apiKey").value;

      if (!message || !apiKey) {
        alert("API key болон message хоёулаа хэрэгтэй");
        return;
      }

      document.getElementById("chatBox").innerHTML +=
        `<div class="msg">👤 ${message}</div>`;

      const res = await fetch("https://api.openai.com/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: "gpt-4o-mini",
          messages: [
            {
              role: "system",
              content: "Чи Намуун нэртэй ухаалаг, тусархаг AI туслах байна."
            },
            {
              role: "user",
              content: message
            }
          ]
        })
      });

      const data = await res.json();

      const reply = data.choices?.[0]?.message?.content || "Алдаа гарлаа";

      document.getElementById("chatBox").innerHTML +=
        `<div class="msg">🤖 ${reply}</div>`;

      document.getElementById("userInput").value = "";
    }
  </script>

</body>
</html>

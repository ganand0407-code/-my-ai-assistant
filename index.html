<script>
const chat = document.getElementById("chat");

function addMsg(text, cls){
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// жижиг “AI тархи”
function getAIResponse(text){
  text = text.toLowerCase();

  if(text.includes("сайн уу") || text.includes("hi")){
    return "Сайн байна уу 😊 Би Намуун байна. Чамд юугаар туслах вэ?";
  }

  if(text.includes("хэн бэ")){
    return "Би чиний хувийн туслах Намуун. Би чамд сурах, хөгжихөд тусална.";
  }

  if(text.includes("зорилго")){
    return "Чиний зорилгыг надад бичээд өг. Би чамд төлөвлөгөө гаргаж өгнө.";
  }

  if(text.includes("тусла")){
    return "Мэдээж 😊 Юунд туслах вэ?";
  }

  if(text.includes("цогт")){
    return "Цогт зохиол чинь уран зөгнөлт AI тухай түүх шүү дээ 👍 Үргэлжлүүлэх үү?";
  }

  // default ухаантай мэт хариу
  return "Би ойлголоо 🤔 Илүү тодорхой хэлж өгвөл илүү сайн тусалж чадна.";
}

function send(){
  const input = document.getElementById("input");
  const text = input.value;
  if(!text) return;

  addMsg("Чи: " + text, "user");

  setTimeout(() => {
    const reply = getAIResponse(text);
    addMsg("Намуун: " + reply, "ai");
  }, 500);

  input.value = "";
}
</script>

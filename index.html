<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Namuun AI</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #0f172a;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  padding: 15px;
  text-align: center;
  background: #111827;
  font-size: 20px;
}

#chat {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

.msg {
  margin: 8px 0;
}

.user { color: #38bdf8; }
.ai { color: #34d399; }

#inputArea {
  display: flex;
  padding: 10px;
  background: #111827;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 6px;
}

button {
  margin-left: 8px;
  padding: 10px 15px;
  border: none;
  background: #3b82f6;
  color: white;
  border-radius: 6px;
}
</style>
</head>

<body>

<header>🤖 Намуун AI (Simple)</header>

<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="Юу асуух вэ?" />
  <button onclick="send()">Илгээх</button>
</div>

<script>
const chat = document.getElementById("chat");

function addMsg(text, cls){
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function getReply(text){
  text = text.toLowerCase();

  if(text.includes("сайн уу")) return "Сайн байна 😊 Би Намуун байна.";
  if(text.includes("хэн")) return "Би чиний хувийн AI туслах Намуун.";
  if(text.includes("зорилго")) return "Чиний зорилгыг хамт төлөвлөж чадна.";
  if(text.includes("цогт")) return "Цогт бол чиний бичиж байгаа AI уран зөгнөлт зохиол 👍";
  if(text.includes("тусла")) return "Мэдээж 😊 Юунд туслах вэ?";

  return "Би ойлголоо 🤔 Илүү тодорхой хэлж өгөөч.";
}

function send(){
  const input = document.getElementById("input");
  const text = input.value;
  if(!text) return;

  addMsg("Чи: " + text, "user");

  setTimeout(() => {
    const reply = getReply(text);
    addMsg("Намуун: " + reply, "ai");
  }, 500);

  input.value = "";
}
</script>

</body>
</html>
